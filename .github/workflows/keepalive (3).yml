name: EpicHost Keepalive

on:
  schedule:
    - cron: '0 * * * *'   # жҜҸе°Ҹж—¶дёҖж¬Ў,UTCж—¶й—ҙ
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Random delay
        run: |
          DELAY=$(( (RANDOM % 300) + 60 ))  # 60~300з§’ = 1~5еҲҶй’ҹ
          echo "йҡҸжңәзӯүеҫ… ${DELAY} з§’еҗҺејҖе§Ӣжү§иЎҢ..."
          sleep "$DELAY"

      - name: Renew servers
        env:
          BASE_URLS: ${{ secrets.EPICHOST_BASE_URLS }}
          API_KEYS: ${{ secrets.EPICHOST_API_KEYS }}
        run: |
          set -euo pipefail

          if ! command -v jq &> /dev/null; then
            sudo apt-get install -y jq
          fi

          URL_COUNT=$(echo "$BASE_URLS" | jq 'length')
          KEY_COUNT=$(echo "$API_KEYS" | jq 'length')

          if [ "$URL_COUNT" != "$KEY_COUNT" ]; then
            echo "й”ҷиҜҜ: BASE_URLS ж•°йҮҸ($URL_COUNT) дёҺ API_KEYS ж•°йҮҸ($KEY_COUNT) дёҚдёҖиҮҙ"
            exit 1
          fi

          FAIL=0
          REPORT=""

          for i in $(seq 0 $((URL_COUNT - 1))); do
            URL=$(echo "$BASE_URLS" | jq -r ".[$i]")
            KEY=$(echo "$API_KEYS" | jq -r ".[$i]")

            echo "===== [$((i+1))/$URL_COUNT] з»ӯжңҹ: $URL ====="

            SUCCESS=0
            LAST_DETAIL=""

            for retry in 1 2 3; do
              echo "е°қиҜ•з¬¬ $retry ж¬Ў..."

              HTTP_CODE=$(curl -s -o /tmp/resp_$i.json -w "%{http_code}" -X POST \
                "$URL" \
                -H "Accept: application/json" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${KEY}" \
                -H "User-Agent: Mozilla/5.0")

              echo "HTTPзҠ¶жҖҒз Ғ: $HTTP_CODE"
              cat /tmp/resp_$i.json || true
              echo ""

              # жҸҗеҸ– detail еӯ—ж®ө(жҲҗеҠҹе“Қеә”йҖҡеёёжІЎжңү errors,еӨұиҙҘе“Қеә”жңү errors[0].detail)
              DETAIL=$(jq -r '
                if .errors then
                  (.errors[0].detail // "жңӘзҹҘй”ҷиҜҜ")
                elif .message then
                  .message
                else
                  "з»ӯжңҹжҲҗеҠҹ"
                end
              ' /tmp/resp_$i.json 2>/dev/null || echo "ж— жі•и§Јжһҗе“Қеә”")

              LAST_DETAIL="$DETAIL"

              if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                echo "з»ӯжңҹжҲҗеҠҹ"
                SUCCESS=1
                break
              fi

              echo "еӨұиҙҘ,зӯүеҫ…йҮҚиҜ•..."
              sleep 10
            done

            if [ "$SUCCESS" -eq 1 ]; then
              REPORT="${REPORT}$(printf 'вң… [%d] %s\nзҠ¶жҖҒ: жҲҗеҠҹ\nиҜҰжғ…: %s\n\n' "$((i+1))" "$URL" "$LAST_DETAIL")"
            else
              REPORT="${REPORT}$(printf 'вқҢ [%d] %s\nзҠ¶жҖҒ: еӨұиҙҘ\nиҜҰжғ…: %s\n\n' "$((i+1))" "$URL" "$LAST_DETAIL")"
              FAIL=1
            fi

          done

          echo "RUN_FAIL=$FAIL" >> "$GITHUB_ENV"

          # дҝқеӯҳжҠҘе‘ҠдҫӣдёӢдёҖжӯҘдҪҝз”Ё(еӨҡиЎҢеҶ…е®№з”Ё EOF еҲҶйҡ”)
          {
            echo "REPORT<<EOF"
            echo "$REPORT"
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Send Telegram notification
        if: always()
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          STATUS_TEXT=$([ "$RUN_FAIL" = "1" ] && echo "вҡ пёҸ йғЁеҲҶ/е…ЁйғЁз»ӯжңҹеӨұиҙҘ" || echo "вң… е…ЁйғЁз»ӯжңҹжҲҗеҠҹ")
          NOW=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          MSG=$(printf 'EpicHost дҝқжҙ»йҖҡзҹҘ\nж—¶й—ҙ: %s\nжҖ»дҪ“зҠ¶жҖҒ: %s\n\n%s' "$NOW" "$STATUS_TEXT" "$REPORT")

          curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -d chat_id="${CHAT_ID}" \
            --data-urlencode text="${MSG}"

      - name: Update time.txt
        run: |
          echo "Last run: $(date -u '+%Y-%m-%d %H:%M:%S') UTC" > time.txt
          echo "Status: $([ "$RUN_FAIL" = "1" ] && echo FAILED || echo SUCCESS)" >> time.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add time.txt
          git diff --staged --quiet || git commit -m "chore: update time.txt [skip ci]"
          git push

      - name: Fail job if any server failed
        if: env.RUN_FAIL == '1'
        run: |
          echo "еӯҳеңЁз»ӯжңҹеӨұиҙҘзҡ„жңҚеҠЎеҷЁ"
          exit 1
