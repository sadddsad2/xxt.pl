name: EpicHost Keepalive

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch: {}

jobs:
  renew:
    runs-on: ubuntu-latest
    steps:
      - name: Renew servers
        env:
          BASE_URLS: ${{ secrets.EPICHOST_BASE_URLS }}
          API_KEYS: ${{ secrets.EPICHOST_API_KEYS }}
        run: |
          set -euo pipefail

          # 检查 jq
          if ! command -v jq &> /dev/null; then
            sudo apt-get install -y jq
          fi

          URL_COUNT=$(echo "$BASE_URLS" | jq 'length')
          KEY_COUNT=$(echo "$API_KEYS" | jq 'length')

          if [ "$URL_COUNT" != "$KEY_COUNT" ]; then
            echo "错误: BASE_URLS 数量($URL_COUNT) 与 API_KEYS 数量($KEY_COUNT) 不一致"
            exit 1
          fi

          FAIL=0

          for i in $(seq 0 $((URL_COUNT - 1))); do
            URL=$(echo "$BASE_URLS" | jq -r ".[$i]")
            KEY=$(echo "$API_KEYS" | jq -r ".[$i]")

            echo "===== [$((i+1))/$URL_COUNT] 续期: $URL ====="

            SUCCESS=0
            for retry in 1 2 3; do
              echo "尝试第 $retry 次..."

              HTTP_CODE=$(curl -s -o /tmp/resp_$i.json -w "%{http_code}" -X POST \
                "$URL" \
                -H "Accept: application/json" \
                -H "Content-Type: application/json" \
                -H "Authorization: Bearer ${KEY}" \
                -H "User-Agent: Mozilla/5.0")

              echo "HTTP状态码: $HTTP_CODE"
              cat /tmp/resp_$i.json || true
              echo ""

              if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
                echo "续期成功"
                SUCCESS=1
                break
              fi

              echo "失败,等待重试..."
              sleep 10
            done

            if [ "$SUCCESS" -eq 0 ]; then
              echo "服务器 $URL 多次重试后仍失败"
              FAIL=1
            fi

            echo ""
          done

          if [ "$FAIL" -eq 1 ]; then
            echo "存在续期失败的服务器"
            exit 1
          fi

          echo "全部续期成功"
